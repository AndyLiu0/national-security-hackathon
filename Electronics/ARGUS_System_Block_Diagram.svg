  <text x="590" y="372" text-anchor="middle" fill="#bfdbfe" font-size="9">12.3MP · CSI-2 · f/1.4</text>
  <text x="590" y="386" text-anchor="middle" fill="#bfdbfe" font-size="9">+ Ricoh Theta Z1 (360°)</text>
  <text x="590" y="400" text-anchor="middle" fill="#93c5fd" font-size="9">Visual ID + custody</text>

