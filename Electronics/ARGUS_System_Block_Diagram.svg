  <rect x="45" y="325" width="200" height="80" rx="4" fill="#042f2e" stroke="#14b8a6"/>
  <text x="145" y="340" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="bold">TIER 1 — Always On (0.5W)</text>
  <text x="145" y="358" text-anchor="middle" fill="#99f6e4" font-size="10">Infrasound MEMS ×12</text>
  <text x="145" y="372" text-anchor="middle" fill="#99f6e4" font-size="9">ICS-40730 · I²S TDM 8-ch</text>
  <text x="145" y="386" text-anchor="middle" fill="#99f6e4" font-size="9">+ 4 wingtip/boom mics</text>
  <text x="145" y="400" text-anchor="middle" fill="#5eead4" font-size="9">Shockwave TDOA detection</text>

  <!-- Tier 2 -->
  <rect x="265" y="325" width="200" height="80" rx="4" fill="#1e1b4b" stroke="#6366f1"/>
  <text x="365" y="340" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="bold">TIER 2 — Wake-on-Detect (2W)</text>
  <text x="365" y="358" text-anchor="middle" fill="#c7d2fe" font-size="10">SWIR InGaAs ×2</text>
  <text x="365" y="372" text-anchor="middle" fill="#c7d2fe" font-size="9">FLIR Lepton 3.5 · SPI VoSPI</text>
  <text x="365" y="386" text-anchor="middle" fill="#c7d2fe" font-size="9">160×120 · 8-14µm</text>
  <text x="365" y="400" text-anchor="middle" fill="#a5b4fc" font-size="9">Thermal plume tracking</text>

  <!-- Tier 3 -->
  <rect x="485" y="325" width="210" height="80" rx="4" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="590" y="340" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">TIER 3 — Cued (3W)</text>
