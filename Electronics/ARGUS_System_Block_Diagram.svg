  <text x="420" y="626" fill="#f87171" font-size="10" text-anchor="end">1.6W</text>

  <text x="50" y="644" fill="#e2e8f0" font-size="10">EO Camera + 360 (off/on)</text>
  <text x="300" y="644" fill="#fcd34d" font-size="10" text-anchor="end">0W</text>
  <text x="420" y="644" fill="#f87171" font-size="10" text-anchor="end">3W</text>

  <text x="50" y="662" fill="#e2e8f0" font-size="10">Comms (LoRa + Iridium)</text>
  <text x="300" y="662" fill="#fcd34d" font-size="10" text-anchor="end">1.5W</text>
  <text x="420" y="662" fill="#f87171" font-size="10" text-anchor="end">5W</text>

  <text x="50" y="680" fill="#e2e8f0" font-size="10">Nav (GPS + IMU + Baro)</text>
  <text x="300" y="680" fill="#fcd34d" font-size="10" text-anchor="end">0.8W</text>
  <text x="420" y="680" fill="#fcd34d" font-size="10" text-anchor="end">0.8W</text>

  <text x="50" y="698" fill="#e2e8f0" font-size="10">Propulsion (cruise motors ×2)</text>
  <text x="300" y="698" fill="#fcd34d" font-size="10" text-anchor="end">60W</text>
  <text x="420" y="698" fill="#fcd34d" font-size="10" text-anchor="end">60W</text>

  <line x1="45" y1="706" x2="480" y2="706" stroke="#334155"/>
  <text x="50" y="722" fill="#f8fafc" font-size="11" font-weight="bold">TOTAL</text>
  <text x="300" y="722" fill="#22c55e" font-size="11" font-weight="bold" text-anchor="end">69.8W</text>
  <text x="420" y="722" fill="#f87171" font-size="11" font-weight="bold" text-anchor="end">85.9W</text>
  <text x="470" y="722" fill="#94a3b8" font-size="9">/ 180W solar</text>

  <!-- INTERFACES LEGEND -->
  <rect x="560" y="520" width="510" height="210" rx="6" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="570" y="540" fill="#e2e8f0" font-size="13" font-weight="bold">INTERFACE PROTOCOLS</text>

  <text x="580" y="568" fill="#22d3ee" font-size="10">■ I²S TDM</text>
  <text x="670" y="568" fill="#94a3b8" font-size="9">8-channel MEMS mics → Jetson (BCLK/LRCK/DOUT)</text>

  <text x="580" y="590" fill="#6366f1" font-size="10">■ SPI</text>
  <text x="670" y="590" fill="#94a3b8" font-size="9">FLIR Lepton VoSPI · LoRa RFM95W · IMU ICM-42688</text>

  <text x="580" y="612" fill="#3b82f6" font-size="10">■ CSI-2</text>
  <text x="670" y="612" fill="#94a3b8" font-size="9">IMX477 EO camera → Jetson (2-lane MIPI)</text>

  <text x="580" y="634" fill="#22c55e" font-size="10">■ UART</text>
  <text x="670" y="634" fill="#94a3b8" font-size="9">GPS NEO-M9N · Iridium 9603N (115200 baud)</text>

  <text x="580" y="656" fill="#f59e0b" font-size="10">■ I²C</text>
  <text x="670" y="656" fill="#94a3b8" font-size="9">BMP390 baro/pressure · power monitoring INA219</text>

  <text x="580" y="678" fill="#ec4899" font-size="10">■ USB 2.0</text>
  <text x="670" y="678" fill="#94a3b8" font-size="9">Ricoh Theta Z1 360° camera</text>

  <text x="580" y="700" fill="#f87171" font-size="10">■ PWM</text>
  <text x="670" y="700" fill="#94a3b8" font-size="9">ESC ×2 motor drive (DShot600)</text>

  <text x="580" y="722" fill="#a78bfa" font-size="10">■ GPIO</text>
  <text x="670" y="722" fill="#94a3b8" font-size="9">Sensor power gates · status LEDs · watchdog</text>
</svg>
