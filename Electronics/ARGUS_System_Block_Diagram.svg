  <text x="477" y="148" text-anchor="middle" fill="#a78bfa" font-size="9">8GB LPDDR5</text>
  <text x="477" y="161" text-anchor="middle" fill="#a78bfa" font-size="9">Sensor Fusion + ML</text>

  <rect x="565" y="100" width="130" height="35" rx="4" fill="#2e1065" stroke="#8b5cf6"/>
  <text x="630" y="118" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">NVMe SSD</text>
  <text x="630" y="130" text-anchor="middle" fill="#a78bfa" font-size="9">256GB · Data logging</text>

  <rect x="565" y="142" width="130" height="35" rx="4" fill="#2e1065" stroke="#8b5cf6"/>
  <text x="630" y="160" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">Heatsink / TEC</text>
  <text x="630" y="172" text-anchor="middle" fill="#a78bfa" font-size="9">Stratospheric cooling</text>

  <line x1="550" y1="125" x2="565" y2="125" stroke="#8b5cf6" marker-end="url(#arr)"/>
  <line x1="550" y1="158" x2="565" y2="158" stroke="#8b5cf6" marker-end="url(#arr)"/>

