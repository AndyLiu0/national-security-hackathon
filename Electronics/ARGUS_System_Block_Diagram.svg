  <text x="420" y="565" fill="#94a3b8" font-size="10" text-anchor="end">Alert</text>
  <line x1="45" y1="572" x2="480" y2="572" stroke="#334155"/>

  <text x="50" y="590" fill="#e2e8f0" font-size="10">Jetson Orin Nano (idle/active)</text>
  <text x="300" y="590" fill="#fcd34d" font-size="10" text-anchor="end">7W</text>
  <text x="420" y="590" fill="#f87171" font-size="10" text-anchor="end">15W</text>

  <text x="50" y="608" fill="#e2e8f0" font-size="10">Infrasound MEMS ×12 (always on)</text>
  <text x="300" y="608" fill="#fcd34d" font-size="10" text-anchor="end">0.5W</text>
  <text x="420" y="608" fill="#fcd34d" font-size="10" text-anchor="end">0.5W</text>

