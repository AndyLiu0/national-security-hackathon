<svg viewBox="0 0 1100 750" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, monospace" font-size="11">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#334155"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#dc2626"/></marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#16a34a"/></marker>
    <marker id="arr-blu" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
  </defs>
  <rect width="1100" height="750" fill="#0f172a" rx="8"/>
  <text x="550" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">PROJECT ARGUS — System Block Diagram</text>
  <text x="550" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">HAPS Hypersonic Missile Detection Platform — Electronics Architecture</text>

  <!-- POWER SECTION -->
  <rect x="30" y="70" width="320" height="200" rx="6" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="88" fill="#f59e0b" font-size="13" font-weight="bold">POWER SYSTEM</text>

  <rect x="45" y="100" width="130" height="45" rx="4" fill="#422006" stroke="#f59e0b"/>
  <text x="110" y="118" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">Solar Array</text>
  <text x="110" y="132" text-anchor="middle" fill="#fcd34d" font-size="9">GaAs Cells · 180W pk</text>

  <rect x="200" y="100" width="130" height="45" rx="4" fill="#422006" stroke="#f59e0b"/>
  <text x="265" y="118" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">MPPT Controller</text>
  <text x="265" y="132" text-anchor="middle" fill="#fcd34d" font-size="9">SPV1050 · 98% eff</text>

  <rect x="45" y="160" width="130" height="45" rx="4" fill="#422006" stroke="#f59e0b"/>
  <text x="110" y="178" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">Battery Pack</text>
  <text x="110" y="192" text-anchor="middle" fill="#fcd34d" font-size="9">4S LiPo · 14.8V · 10Ah</text>

  <rect x="200" y="160" width="130" height="45" rx="4" fill="#422006" stroke="#f59e0b"/>
  <text x="265" y="178" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">Power Distribution</text>
  <text x="265" y="192" text-anchor="middle" fill="#fcd34d" font-size="9">5V / 3.3V / 1.8V rails</text>

  <rect x="120" y="220" width="130" height="40" rx="4" fill="#422006" stroke="#f59e0b"/>
  <text x="185" y="238" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">Motor ESC ×2</text>
  <text x="185" y="250" text-anchor="middle" fill="#fcd34d" font-size="9">BLDC · 200W each</text>

  <line x1="175" y1="122" x2="200" y2="122" stroke="#f59e0b" marker-end="url(#arr)"/>
  <line x1="265" y1="145" x2="265" y2="160" stroke="#f59e0b" marker-end="url(#arr)"/>
  <line x1="175" y1="182" x2="200" y2="182" stroke="#f59e0b" marker-end="url(#arr)"/>
  <line x1="265" y1="205" x2="265" y2="220" stroke="#f59e0b" marker-end="url(#arr)"/>

  <!-- EDGE COMPUTE -->
  <rect x="390" y="70" width="320" height="120" rx="6" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="88" fill="#8b5cf6" font-size="13" font-weight="bold">EDGE COMPUTE</text>

  <rect x="405" y="100" width="145" height="75" rx="4" fill="#2e1065" stroke="#8b5cf6"/>
