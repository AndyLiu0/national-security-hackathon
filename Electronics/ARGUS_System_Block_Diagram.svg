  <text x="990" y="132" text-anchor="middle" fill="#bbf7d0" font-size="9">9603N · UART</text>
  <text x="990" y="144" text-anchor="middle" fill="#bbf7d0" font-size="9">Global satellite uplink</text>

  <rect x="765" y="165" width="140" height="50" rx="4" fill="#052e16" stroke="#22c55e"/>
  <text x="835" y="183" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">GPS Antenna</text>
  <text x="835" y="197" text-anchor="middle" fill="#bbf7d0" font-size="9">Active patch · SMA</text>
  <text x="835" y="209" text-anchor="middle" fill="#bbf7d0" font-size="9">u-blox NEO-M9N</text>

  <rect x="920" y="165" width="140" height="50" rx="4" fill="#052e16" stroke="#22c55e"/>
  <text x="990" y="183" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">SatCom Dome</text>
  <text x="990" y="197" text-anchor="middle" fill="#bbf7d0" font-size="9">L-band patch</text>
  <text x="990" y="209" text-anchor="middle" fill="#bbf7d0" font-size="9">Fuselage top-mount</text>

  <!-- Comms→Compute arrows -->
  <line x1="765" y1="135" x2="710" y2="140" stroke="#22c55e" stroke-dasharray="4,2" marker-end="url(#arr-grn)"/>

